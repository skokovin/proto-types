syntax = "proto3";

// Это имя будет использовано как название модуля в Rust
package my_exchange;

// Описание нашей сделки
message Trade {
  // Номер слота (блока) в Solana
  uint64 slot = 1;

  // Сигнатура транзакции (строка)
  string signature = 2;

  // Сумма сделки (в лампортах или минимальных единицах)
  uint64 amount = 3;

  // Флаг: true = покупка, false = продажа
  bool is_buy = 4;
}